name: CI

# The Python toolchain is the spec lock for HoopClone's rating math and shot
# model (see docs/DATA_ENGINE.md and docs/SHOT_MODEL.md). Run it on every push
# and PR so a change that breaks the curve can't merge unnoticed.

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref so a fast follow-up push doesn't queue
# behind a stale run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The core normalisation + shot model are stdlib-only; only pytest is
      # needed to run the suite. nba_api (live import) is import-guarded and not
      # exercised by the tests, so we deliberately skip it to keep CI fast and
      # network-free.
      - name: Install pytest
        run: python -m pip install --upgrade pip "pytest>=8.0"

      - name: Run data + sim test suites
        run: python -m pytest tools -v

  godot-tests:
    name: Godot engine self-test
    runs-on: ubuntu-latest
    # Runs the REAL GDScript sim (game/core/*.gd) headlessly so the engine-side
    # behaviour is verified, not just the Python mirror. Pinned to the project's
    # Godot version (project.godot config/features "4.3").
    env:
      GODOT_VERSION: "4.3-stable"
      GODOT_BIN: Godot_v4.3-stable_linux.x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_BIN}.zip"
          curl -fsSL -o godot.zip "$url"
          unzip -q godot.zip
          chmod +x "$GODOT_BIN"

      - name: Run Godot self-test
        run: ./"$GODOT_BIN" --headless --path . --script res://tests/godot/run_tests.gd
